<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Coding 数据看板</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <p class="tag">GitHub Pages Home</p>
      <h1>AI Coding 资讯收集与展示主页</h1>
      <p class="intro">
        这个页面直接展示仓库每天自动收集的 AI Coding 相关条目，包含来源、发布时间、分数与跳转链接。
        你打开主页就能看到“数据是否在更新”。
      </p>
      <div class="actions">
        <a href="./blog.json" target="_blank" rel="noopener noreferrer">查看原始 blog.json</a>
        <a href="./outputs/reports/ai_coding_report_template.md" target="_blank" rel="noopener noreferrer">查看报告模板</a>
      </div>
    </header>

    <section class="stats" id="stats">
      <article><h2 id="total-count">0</h2><p>收集条目</p></article>
      <article><h2 id="source-count">0</h2><p>数据源</p></article>
      <article><h2 id="latest-time">-</h2><p>最近发布时间</p></article>
    </section>

    <section class="panel">
      <div class="panel-title-row">
        <h2>来源分布</h2>
        <span id="refresh-note">等待加载…</span>
      </div>
      <div id="source-breakdown" class="chip-list"></div>
    </section>

    <section class="panel">
      <div class="panel-title-row">
        <h2>最新收集内容</h2>
      </div>
      <div id="feed" class="feed"></div>
    </section>
  </main>

  <script>
    const feed = document.getElementById('feed');
    const sourceBreakdown = document.getElementById('source-breakdown');
    const totalCount = document.getElementById('total-count');
    const sourceCount = document.getElementById('source-count');
    const latestTime = document.getElementById('latest-time');
    const refreshNote = document.getElementById('refresh-note');

    function toDisplayDate(raw) {
      if (!raw) return '-';
      const date = new Date(raw);
      if (Number.isNaN(date.getTime())) return raw;
      return date.toLocaleString('zh-CN', { hour12: false });
    }

    function parseScore(text) {
      const match = (text || '').match(/score=([\d.]+)/);
      return match ? Number(match[1]) : null;
    }

    function renderStats(items) {
      totalCount.textContent = items.length;

      const sources = {};
      let latest = null;

      items.forEach((item) => {
        const source = item.source_id || 'unknown';
        sources[source] = (sources[source] || 0) + 1;

        const published = item.published_at ? new Date(item.published_at) : null;
        if (published && !Number.isNaN(published.getTime())) {
          if (!latest || published > latest) latest = published;
        }
      });

      sourceCount.textContent = Object.keys(sources).length;
      latestTime.textContent = latest ? latest.toLocaleString('zh-CN', { hour12: false }) : '-';
      refreshNote.textContent = latest ? `最近数据时间：${latest.toLocaleString('zh-CN', { hour12: false })}` : '暂无可解析时间';

      sourceBreakdown.innerHTML = '';
      Object.entries(sources)
        .sort((a, b) => b[1] - a[1])
        .forEach(([source, count]) => {
          const chip = document.createElement('span');
          chip.className = 'chip';
          chip.textContent = `${source}: ${count}`;
          sourceBreakdown.appendChild(chip);
        });
    }

    function renderFeed(items) {
      feed.innerHTML = '';
      if (!Array.isArray(items) || items.length === 0) {
        feed.innerHTML = '<div class="empty">暂无数据，等待下一次抓取任务完成。</div>';
        return;
      }

      const sorted = [...items].sort((a, b) => parseScore(b.sub_title) - parseScore(a.sub_title));

      sorted.forEach((item) => {
        const card = document.createElement('article');
        card.className = 'item';

        const title = item.title || 'Untitled';
        const subtitle = item.sub_title || '无摘要';
        const source = item.source_host || item.source_id || 'unknown';
        const publishedAt = toDisplayDate(item.published_at);
        const target = item.external_url || `./blog/${item.url_title || ''}/`;

        card.innerHTML = `
          <a href="${target}" target="_blank" rel="noopener noreferrer">
            <h3>${title}</h3>
            <p class="meta">${subtitle}</p>
            <p class="detail">来源：${source} · 发布时间：${publishedAt}</p>
          </a>
        `;

        feed.appendChild(card);
      });
    }

    fetch('./blog.json')
      .then((resp) => {
        if (!resp.ok) throw new Error('feed request failed');
        return resp.json();
      })
      .then((items) => {
        renderStats(items);
        renderFeed(items);
      })
      .catch(() => {
        refreshNote.textContent = '加载失败，请稍后刷新重试';
        feed.innerHTML = '<div class="empty">读取 blog.json 失败，请检查发布产物是否包含该文件。</div>';
      });
  </script>
</body>
</html>
